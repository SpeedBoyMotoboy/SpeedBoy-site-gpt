<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEEDBOY — Rastreio</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#070709;--card:#13131a;--card2:#1a1a24;--border:#252535;
  --accent:#f5c518;--accent2:#ff6b00;--green:#00a854;--red:#ff4560;--blue:#3b82f6;
  --text:#f0f0f0;--muted:#666;--radius:16px;
}
body.light{
  --bg:#f5f5f0;--card:#ffffff;--card2:#f0f0eb;--border:#ddddd5;
  --accent:#c9920a;--accent2:#e05500;--green:#1a7a3f;--red:#cc2233;--text:#1a1a1a;--muted:#888;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
body{max-width:480px;margin:0 auto;padding-bottom:40px;}

.hero{position:relative;overflow:hidden;padding:28px 20px 24px;background:linear-gradient(160deg,#0d0d14 0%,#1a1220 60%,#0d0d14 100%);border-bottom:1px solid var(--border);text-align:center;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,197,24,.12) 0%,transparent 65%);pointer-events:none;}
.hero-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;letter-spacing:-2px;color:var(--accent);position:relative;}
.hero-logo span{color:var(--text);}
.hero-tag{font-size:13px;color:var(--muted);margin-top:4px;}
.theme-toggle{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;}

.wrap{padding:20px 16px;}

.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.error-wrap{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;padding:40px 24px;text-align:center;}
.error-wrap.show{display:flex;}

/* STATUS TRACKER */
.status-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.status-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:18px;}
.steps{display:flex;flex-direction:column;gap:0;}
.step{display:flex;align-items:flex-start;gap:14px;position:relative;}
.step:not(:last-child)::after{content:'';position:absolute;left:18px;top:38px;width:2px;height:calc(100% - 10px);background:var(--border);}
.step.done:not(:last-child)::after{background:var(--green);}
.step-icon{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;z-index:1;}
.step.done .step-icon{border-color:var(--green);background:rgba(0,168,84,.15);}
.step.active .step-icon{border-color:var(--accent);background:rgba(245,197,24,.15);animation:pulse 1.5s ease-in-out infinite;}
.step.refused .step-icon{border-color:var(--red);background:rgba(255,69,96,.15);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,197,24,.4)}50%{box-shadow:0 0 0 8px rgba(245,197,24,0)}}
.step-body{padding:6px 0 20px;flex:1;}
.step-label{font-weight:700;font-size:15px;margin-bottom:2px;}
.step.done .step-label{color:var(--green);}
.step.active .step-label{color:var(--accent);}
.step.refused .step-label{color:var(--red);}
.step.pending .step-label{color:var(--muted);}
.step-time{font-size:11px;color:var(--muted);}

/* INFO CARD */
.info-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.info-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
.info-row:last-child{margin-bottom:0;}
.info-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.info-txt{flex:1;}
.info-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
.info-val{font-size:14px;font-weight:500;}

/* LOCATION CARD */
.loc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.loc-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;}
.loc-refresh{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.loc-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.loc-dot.offline{background:var(--muted);animation:none;}
.loc-status{font-size:12px;color:var(--muted);}
.btn-maps{width:100%;background:linear-gradient(135deg,#4285f4,#1a73e8);color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;}
.btn-maps:active{opacity:.85;}

/* DELIVERED */
.delivered-wrap{background:linear-gradient(135deg,rgba(0,168,84,.15),rgba(0,168,84,.05));border:1px solid rgba(0,168,84,.4);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:16px;}
.delivered-icon{font-size:56px;margin-bottom:12px;}
.delivered-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:var(--green);margin-bottom:6px;}
.delivered-sub{font-size:13px;color:var(--muted);}
</style>
</head>
<body>
<div class="hero">
  <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️ Claro</button>
  <div class="hero-logo">SPEED<span>BOY</span></div>
  <div class="hero-tag">Rastreio de Entrega</div>
</div>

<div id="loadingWrap" class="loading-wrap">
  <div class="spinner"></div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--accent);">Carregando...</div>
</div>

<div id="mainWrap" class="wrap" style="display:none;"></div>

<div id="errorWrap" class="error-wrap">
  <div style="font-size:56px;margin-bottom:16px">❌</div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:var(--red);margin-bottom:10px;">Link inválido</div>
  <div style="font-size:13px;color:var(--muted);line-height:1.6;max-width:260px;">Este link de rastreio não foi encontrado ou expirou.</div>
</div>

<script>
'use strict';
var FIREBASE_CONFIG = {
  apiKey:"AIzaSyDL8c28T9Q-IAK9JihzEXtT-OPiYOx24Jg",
  authDomain:"speedboy-3c1c6.firebaseapp.com",
  projectId:"speedboy-3c1c6",
  storageBucket:"speedboy-3c1c6.firebasestorage.app",
  messagingSenderId:"702743802978",
  appId:"1:702743802978:web:7b99217bebcc89f9bc8d3b",
  databaseURL:"https://speedboy-3c1c6-default-rtdb.firebaseio.com"
};

var params = new URLSearchParams(window.location.search);
var ROOM = (params.get('room') || '').toUpperCase().trim();
var KEY  = params.get('key') || '';
var db   = null;
var trackData = null;
var locData   = null;

var STATUS_STEPS = [
  { key: 'aceito',    icon: '✅', label: 'Pedido aceito',     sub: 'Seu pedido foi confirmado pelo entregador' },
  { key: 'a caminho', icon: '🛵', label: 'A caminho',          sub: 'O entregador está a caminho com seu pedido' },
  { key: 'entregue',  icon: '📦', label: 'Entregue!',           sub: 'Seu pedido foi entregue com sucesso' }
];

function init() {
  if (!ROOM || !KEY) { showError(); return; }
  if (localStorage.getItem('sb_track_theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '🌙 Escuro';
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
  } catch(e) { showError(); return; }

  // Listen to tracking status
  db.ref('rooms/' + ROOM + '/tracking/' + KEY).on('value', function(snap) {
    var raw = snap.val();
    if (raw === null) {
      // Not yet tracked — show waiting state
      trackData = { status: 'aguardando' };
    } else {
      try { trackData = typeof raw === 'string' ? JSON.parse(raw) : raw; }
      catch(e) { trackData = { status: 'aguardando' }; }
    }
    render();
  });

  // Listen to motoboy location
  db.ref('rooms/' + ROOM + '/location').on('value', function(snap) {
    var raw = snap.val();
    if (raw !== null) {
      try { locData = typeof raw === 'string' ? JSON.parse(raw) : raw; }
      catch(e) { locData = null; }
    }
    render();
  });
}

function render() {
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('mainWrap').style.display = 'block';

  var status  = (trackData && trackData.status) || 'aguardando';
  var info    = (trackData && trackData.info)   || {};
  var updated = trackData && trackData.updatedAt ? fmtTime(trackData.updatedAt) : '';
  var wrap    = document.getElementById('mainWrap');

  if (status === 'recusado') {
    wrap.innerHTML =
      '<div style="background:rgba(255,69,96,.1);border:1px solid rgba(255,69,96,.4);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:16px;">' +
        '<div style="font-size:48px;margin-bottom:12px;">❌</div>' +
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:24px;color:var(--red);margin-bottom:6px;">Pedido não disponível</div>' +
        '<div style="font-size:13px;color:var(--muted);">Entre em contato com a loja para mais informações.</div>' +
      '</div>';
    return;
  }

  if (status === 'entregue') {
    wrap.innerHTML =
      '<div class="delivered-wrap">' +
        '<div class="delivered-icon">🎉</div>' +
        '<div class="delivered-title">Entregue!</div>' +
        '<div class="delivered-sub">Seu pedido foi entregue com sucesso' + (updated ? ' às ' + updated : '') + '.</div>' +
      '</div>' +
      renderInfoCard(info);
    return;
  }

  var stepsHtml = STATUS_STEPS.map(function(step) {
    var stepOrder = STATUS_STEPS.findIndex(function(s){ return s.key === status; });
    var myOrder   = STATUS_STEPS.findIndex(function(s){ return s.key === step.key; });
    var cls;
    if (myOrder < stepOrder)      cls = 'done';
    else if (myOrder === stepOrder) cls = status === 'aguardando' ? 'pending' : 'active';
    else                            cls = 'pending';

    var timeStr = (cls === 'active' && updated) ? '<div class="step-time">Atualizado às ' + updated + '</div>' : '';
    return '<div class="step ' + cls + '">' +
      '<div class="step-icon">' + (cls === 'done' ? '✔️' : step.icon) + '</div>' +
      '<div class="step-body">' +
        '<div class="step-label">' + step.label + '</div>' +
        '<div class="step-time">' + step.sub + '</div>' +
        timeStr +
      '</div>' +
    '</div>';
  }).join('');

  // Waiting (not yet aceito)
  if (status === 'aguardando') {
    stepsHtml =
      '<div class="step active">' +
        '<div class="step-icon" style="animation:pulse 1.5s ease-in-out infinite;border-color:var(--muted);">⏳</div>' +
        '<div class="step-body"><div class="step-label" style="color:var(--muted);">Aguardando confirmação</div><div class="step-time">Seu pedido foi recebido e aguarda confirmação do entregador</div></div>' +
      '</div>';
  }

  wrap.innerHTML =
    '<div class="status-card">' +
      '<div class="status-title">📍 Status da entrega</div>' +
      '<div class="steps">' + stepsHtml + '</div>' +
    '</div>' +
    renderInfoCard(info) +
    renderLocCard();
}

function renderInfoCard(info) {
  if (!info || (!info.name && !info.address && !info.store)) return '';
  var rows = '';
  if (info.store) rows += '<div class="info-row"><div class="info-icon">🏪</div><div class="info-txt"><div class="info-lbl">Loja</div><div class="info-val">' + esc(info.store) + '</div></div></div>';
  if (info.name)  rows += '<div class="info-row"><div class="info-icon">👤</div><div class="info-txt"><div class="info-lbl">Cliente</div><div class="info-val">' + esc(info.name) + '</div></div></div>';
  if (info.address) rows += '<div class="info-row"><div class="info-icon">📍</div><div class="info-txt"><div class="info-lbl">Endereço</div><div class="info-val">' + esc(info.address) + '</div></div></div>';
  return '<div class="info-card">' + rows + '</div>';
}

function renderLocCard() {
  if (!locData || !locData.lat || !locData.lng) return '';
  var status = (trackData && trackData.status) || '';
  // Só mostra localização quando a caminho
  if (status !== 'a caminho' && status !== 'aceito') return '';
  var age = locData.updatedAt ? ageStr(locData.updatedAt) : '';
  var mapsUrl = 'https://maps.google.com/?q=' + locData.lat + ',' + locData.lng;
  return '<div class="loc-card">' +
    '<div class="loc-title">📡 Localização do entregador</div>' +
    '<div class="loc-refresh">' +
      '<div class="loc-dot' + (age && age.includes('min') ? ' offline' : '') + '"></div>' +
      '<div class="loc-status">' + (age ? 'Atualizado ' + age : 'Localização ativa') + '</div>' +
    '</div>' +
    '<a class="btn-maps" href="' + mapsUrl + '" target="_blank">🗺️ Ver no Google Maps</a>' +
  '</div>';
}

function fmtTime(iso) {
  try {
    return new Date(iso).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  } catch(e) { return ''; }
}

function ageStr(iso) {
  try {
    var diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (diff < 60)  return 'há ' + diff + 's';
    if (diff < 3600) return 'há ' + Math.floor(diff/60) + ' min';
    return 'há ' + Math.floor(diff/3600) + 'h';
  } catch(e) { return ''; }
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showError() {
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('errorWrap').classList.add('show');
}

function toggleTheme() {
  var isLight = document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isLight ? '🌙 Escuro' : '☀️ Claro';
  localStorage.setItem('sb_track_theme', isLight ? 'light' : 'dark');
}

window.addEventListener('load', init);
</script>
</body>
</html>
