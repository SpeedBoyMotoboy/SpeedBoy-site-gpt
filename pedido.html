<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPEEDBOY — Pedido</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase via CDN estático — sem dynamic import -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#070709;--card:#13131a;--card2:#1a1a24;--border:#252535;
  --accent:#f5c518;--accent2:#ff6b00;--green:#00a854;--red:#ff4560;
  --text:#f0f0f0;--muted:#666;--radius:16px;
}
/* LIGHT THEME */
body.light{
  --bg:#f5f5f0;--card:#ffffff;--card2:#f0f0eb;--border:#ddddd5;
  --accent:#c9920a;--accent2:#e05500;--green:#1a7a3f;--red:#cc2233;
  --text:#1a1a1a;--muted:#888;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
body{max-width:480px;margin:0 auto;padding-bottom:50px;}

.hero{position:relative;overflow:hidden;padding:32px 20px 28px;background:linear-gradient(160deg,#0d0d14 0%,#1a1220 60%,#0d0d14 100%);border-bottom:1px solid var(--border);text-align:center;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,197,24,.12) 0%,transparent 65%);pointer-events:none;}
.hero-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:42px;letter-spacing:-2px;color:var(--accent);position:relative;}
.hero-logo span{color:var(--text);}
.hero-tag{font-size:13px;color:var(--muted);margin-top:6px;letter-spacing:.5px;}
.theme-toggle{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;backdrop-filter:blur(4px);}
body.light .theme-toggle{background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.15);}
.hero-badge{display:none;align-items:center;gap:6px;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);border-radius:20px;padding:6px 14px;margin-top:12px;font-size:13px;font-weight:600;color:var(--accent);justify-content:center;}
.hero-badge.show{display:inline-flex;}

.form-wrap{padding:20px 16px 0;}
.sec-divider{display:flex;align-items:center;gap:12px;margin:20px 0 18px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:1px;}
.sec-divider::before,.sec-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* STOP CARD */
.stops-wrap{display:flex;flex-direction:column;gap:12px;}
.stop-card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;}
.stop-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card2);border-bottom:1px solid var(--border);}
.stop-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:.5px;color:var(--accent);display:flex;align-items:center;gap:7px;}
.stop-num{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#000;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;}
.btn-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:2px;}
.stop-card-body{padding:14px;}

.field-group{margin-bottom:12px;}
.field-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.req{color:var(--red);}
.field-input{width:100%;background:var(--card2);border:1.5px solid var(--border);color:var(--text);border-radius:12px;padding:13px 14px;font-size:15px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--muted);}
.field-input.error{border-color:var(--red);}
.field-row{display:flex;gap:10px;}
.field-row .field-group{flex:1;}

/* TIME */
.time-row{display:flex;gap:8px;align-items:flex-end;}
.time-sep{font-size:12px;color:var(--muted);font-weight:600;padding-bottom:14px;flex-shrink:0;}
.time-input{width:100%;background:var(--card2);border:1.5px solid var(--border);color:var(--text);border-radius:12px;padding:13px 14px;font-size:15px;font-family:'Barlow',sans-serif;outline:none;text-align:center;transition:border-color .2s;}
.time-input:focus{border-color:var(--accent);}

/* PAYMENT */
.pay-row{display:flex;gap:8px;}
.pay-btn{flex:1;padding:11px 8px;border-radius:10px;border:1.5px solid var(--border);background:var(--card2);color:var(--muted);font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;cursor:pointer;text-align:center;transition:all .2s;}
.pay-btn.paid{border-color:var(--green);background:rgba(0,230,118,.1);color:var(--green);}
.pay-btn.due{border-color:var(--accent);background:rgba(245,197,24,.1);color:var(--accent);}
.value-group{display:none;margin-top:10px;}
.value-group.show{display:block;}

/* ADD STOP */
.btn-add-stop{width:100%;background:transparent;border:1.5px dashed var(--border);border-radius:var(--radius);color:var(--muted);font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;transition:all .2s;}
.btn-add-stop:active{border-color:var(--accent);color:var(--accent);}

/* SUBMIT */
.submit-wrap{padding:0 16px;margin-top:24px;}
.btn-submit{width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000;border:none;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;letter-spacing:.5px;padding:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 24px rgba(245,197,24,.25);}
.btn-submit:active{opacity:.85;}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
.submit-note{text-align:center;font-size:11px;color:var(--muted);margin-top:10px;}

/* SUCCESS */
.success-wrap{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.success-wrap.show{display:flex;}
.success-icon{font-size:80px;margin-bottom:20px;animation:pop .5s ease;}
@keyframes pop{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;color:var(--green);margin-bottom:8px;}
.success-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:300px;}
.success-list{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-top:20px;width:100%;text-align:left;}
.success-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.success-item:last-child{border-bottom:none;}
.btn-novo{margin-top:20px;background:var(--accent);color:#000;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;padding:14px 36px;border-radius:var(--radius);cursor:pointer;}

/* ERROR */
.error-wrap{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.error-wrap.show{display:flex;}

/* LOADING */
.loading{display:none;position:fixed;inset:0;background:rgba(7,7,9,.9);align-items:center;justify-content:center;z-index:500;flex-direction:column;gap:18px;backdrop-filter:blur(6px);}
.loading.show{display:flex;}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;color:var(--accent);}

/* CLIENT HISTORY */
.hist-toggle{width:100%;background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;padding:12px 16px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.hist-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:8px;}
.hist-panel.open{display:block;}
.hist-item{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;}
.hist-item:last-child{border-bottom:none;}
.hist-item-name{font-weight:600;color:var(--text);}
.hist-item-info{color:var(--muted);margin-top:2px;}
.hist-empty{padding:16px;text-align:center;color:var(--muted);font-size:12px;}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--red);color:var(--red);}
.toast.success{border-color:var(--green);color:var(--green);}
</style>
</head>
<body>

<div class="toast"  id="toast"></div>
<div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">Enviando para o Luan...</div></div>

<!-- HERO -->
<div class="hero">
  <button class="theme-toggle" id="themeBtn" onclick="window.toggleTheme()">☀️ Claro</button>
  <div class="hero-logo">SPEED<span>BOY</span></div>
  <div class="hero-tag">Sua entrega nossa prioridade</div>
  <div class="hero-badge" id="heroBadge">🏪 <span id="storeSpan"></span></div>
</div>

<!-- FORM -->
<div id="mainWrap">
  <div class="form-wrap">
    <div class="sec-divider">ENTREGAS</div>
    <div class="stops-wrap" id="stopsWrap"></div>
    <button class="btn-add-stop" id="btnAdd" onclick="window.addStop()">
      <span style="font-size:20px">＋</span> Adicionar outro endereço
    </button>
  </div>
  <div class="form-wrap" style="padding-top:0;">
  <button class="hist-toggle" onclick="window.toggleHistory()">
    📋 Meu histórico de pedidos <span id="histCount"></span>
    <span id="histArrow">▼</span>
  </button>
  <div class="hist-panel" id="histPanel">
    <div id="histList"><div class="hist-empty">Nenhum pedido ainda.</div></div>
  </div>
</div>
<div class="submit-wrap">
    <button class="btn-submit" id="btnSubmit" onclick="window.submitPedido()">
      🛵 Enviar para o Luan
    </button>
    <div class="submit-note">O Luan receberá as entregas automaticamente</div>
  </div>
</div>

<!-- SUCCESS -->
<div class="success-wrap" id="successWrap">
  <div class="success-icon">🛵</div>
  <div class="success-title">Pedido enviado!</div>
  <div class="success-sub">O Luan já recebeu! Ele vai confirmar as entregas em instantes.</div>
  <div class="success-list" id="successList"></div>
  <button class="btn-novo" onclick="window.resetForm()">+ Novo pedido</button>
</div>

<!-- ERROR -->
<div class="error-wrap" id="errorWrap">
  <div style="font-size:64px;margin-bottom:16px">⚠️</div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--red);margin-bottom:10px">Link inválido</div>
  <div style="font-size:13px;color:var(--muted);line-height:1.6;max-width:260px">Peça um novo link para o Luan.</div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  BAIRROS POR CIDADE — Região Metropolitana Vitória
// ═══════════════════════════════════════════════════
var CIDADE_BAIRROS = {
  'vitoria': {
    nome: 'Vitória',
    bairros: ['Centro', 'Praia do Canto', 'Bento Ferreira', 'Jardim Camburi', 'Santo Antônio', 'Maruípe', 'Jucutuquara', 'São Cristóvão', 'Morro do Moscoso', 'Funchal', 'Tabuazeiro', 'Ilhas']
  },
  'vilavelha': {
    nome: 'Vila Velha',
    bairros: ['Centro', 'Praia Costa', 'Ataíde', 'Itapemirim', 'Praia de Itaparica', 'Pontal das Garças', 'De Todos Os Santos', 'Barro Vermelho', 'Caxangá', 'Araxá']
  },
  'cariacica': {
    nome: 'Cariacica',
    bairros: ['Centro', 'Campo Grande', 'Barra do Jucu', 'Santa Paula', 'Sahy', 'Dois Rios', 'Tabajara', 'Porto de Cariacica', 'Utopia']
  },
  'serra': {
    nome: 'Serra',
    bairros: ['Centro', 'Laranjeiras', 'Manguinhos', 'Carapina', 'Novo México', 'Jacaraípe', 'Parque Residencial Laranjeiras', 'Homocea', 'Feu Rosa']
  },
  'viana': {
    nome: 'Viana',
    bairros: ['Centro', 'Alto Marista', 'Sede', 'Distrito de Itaguaçu']
  }
};

// ═══════════════════════════════════════════════════
//  CONFIGURAÇÃO FIREBASE — hardcoded
// ═══════════════════════════════════════════════════
var FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDL8c28T9Q-IAK9JihzEXtT-OPiYOx24Jg",
  authDomain:        "speedboy-3c1c6.firebaseapp.com",
  projectId:         "speedboy-3c1c6",
  storageBucket:     "speedboy-3c1c6.firebasestorage.app",
  messagingSenderId: "702743802978",
  appId:             "1:702743802978:web:7b99217bebcc89f9bc8d3b",
  databaseURL:       "https://speedboy-3c1c6-default-rtdb.firebaseio.com"
};

// URL params
var params     = new URLSearchParams(window.location.search);
var ROOM       = (params.get('room') || '').toUpperCase();
var STORE_NAME = params.get('store') || '';

var db         = null;
var stopCount  = 0;

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
function init() {
  // Mostra nome da loja no badge
  if (STORE_NAME) {
    document.getElementById('storeSpan').textContent = STORE_NAME;
    document.getElementById('heroBadge').classList.add('show');
    document.title = 'SPEEDBOY — ' + STORE_NAME;
  }

  // Verifica se tem sala
  if (!ROOM) {
    document.getElementById('mainWrap').style.display = 'none';
    document.getElementById('errorWrap').classList.add('show');
    return;
  }

  // Inicializa Firebase
  try {
    var app = firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    console.log('Firebase OK — sala:', ROOM);
  } catch(e) {
    console.error('Firebase init error:', e);
    showToast('Erro ao conectar. Tente novamente.', 'error');
  }

  // Define data padrão como hoje
  setTimeout(function() {
    var dateInputs = document.querySelectorAll('input[type="date"]');
    var today = new Date().toISOString().split('T')[0];
    dateInputs.forEach(function(el){ if(!el.value) el.value = today; });
  }, 100);

  // Restaura tema salvo
  if (localStorage.getItem('sb_pedido_theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('themeBtn').textContent = '🌙 Escuro';
  }

  // Adiciona primeiro stop
  initClientHistory();
  window.addStop();
}

// ═══════════════════════════════════════════════════
//  GERENCIAR STOPS
// ═══════════════════════════════════════════════════
window.addStop = function() {
  stopCount++;
  var id  = 'stop_' + stopCount;
  var num = document.querySelectorAll('.stop-card').length + 1;

  var div = document.createElement('div');
  div.className = 'stop-card';
  div.id = id;

  div.innerHTML =
    '<div class="stop-card-hdr">' +
      '<div class="stop-card-title">' +
        '<div class="stop-num">' + num + '</div>' +
        'ENTREGA ' + num +
      '</div>' +
      (num > 1 ? '<button class="btn-rm" onclick="window.removeStop(\'' + id + '\')">✕</button>' : '') +
    '</div>' +
    '<div class="stop-card-body">' +
      '<div class="field-group">' +
        '<div class="field-label">Nome do cliente <span class="req">*</span></div>' +
        '<input class="field-input" id="' + id + '_name" placeholder="Ex: Pedro Santos" />' +
      '</div>' +
      '<div class="sec-divider" style="margin:16px 0 12px">📍 Endereço</div>' +
      '<div class="field-row">' +
        '<div class="field-group">' +
          '<div class="field-label">Cidade <span class="req">*</span></div>' +
          '<select class="field-input" id="' + id + '_city" style="appearance:none;cursor:pointer" onchange="window.updateBairros(\'' + id + '\')">' +
            '<option value="">— Selecione —</option>' +
            '<option value="vitoria">Vitória</option>' +
            '<option value="vilavelha">Vila Velha</option>' +
            '<option value="cariacica">Cariacica</option>' +
            '<option value="serra">Serra</option>' +
            '<option value="viana">Viana</option>' +
          '</select>' +
        '</div>' +
        '<div class="field-group">' +
          '<div class="field-label">Bairro <span class="req">*</span></div>' +
          '<select class="field-input" id="' + id + '_bairro" style="appearance:none;cursor:pointer">' +
            '<option value="">— Selecione a cidade —</option>' +
          '</select>' +
        '</div>' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">Rua / Avenida <span class="req">*</span></div>' +
        '<input class="field-input" id="' + id + '_rua" placeholder="Rua Exemplo, Avenida Brasil..." />' +
      '</div>' +
      '<div class="field-row">' +
        '<div class="field-group">' +
          '<div class="field-label">Número <span class="req">*</span></div>' +
          '<input class="field-input" id="' + id + '_numero" placeholder="123" />' +
        '</div>' +
        '<div class="field-group">' +
          '<div class="field-label">Complemento <span class="req">*</span></div>' +
          '<input class="field-input" id="' + id + '_complement" placeholder="Apto 42, bloco C, próximo à padaria..." />' +
        '</div>' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">📅 Data da entrega <span class="req">*</span></div>' +
        '<input class="field-input" id="' + id + '_date" type="date" style="color:var(--text)" />' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">Tipo de serviço</div>' +
        '<select class="field-input" id="' + id + '_type" style="appearance:none;cursor:pointer">' +
          '<option value="entrega">🛵 Entrega</option>' +
          '<option value="retirada">📦 Retirada</option>' +
          '<option value="troca">🔄 Troca</option>' +
        '</select>' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">⏰ Horário (opcional)</div>' +
        '<div class="time-row">' +
          '<div style="flex:1">' +
            '<div style="font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;">DE</div>' +
            '<input class="time-input" id="' + id + '_timeFrom" type="time" />' +
          '</div>' +
          '<div class="time-sep">até</div>' +
          '<div style="flex:1">' +
            '<div style="font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600;">ATÉ</div>' +
            '<input class="time-input" id="' + id + '_timeTo" type="time" />' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="field-row">' +
        '<div class="field-group">' +
          '<div class="field-label">Telefone</div>' +
          '<input class="field-input" id="' + id + '_phone" type="tel" placeholder="(XX) XXXXX-XXXX" oninput="window.maskPhone(this)" maxlength="15" />' +
        '</div>' +
      '</div>' +
      '<div class="field-group">' +
        '<div class="field-label">Pagamento <span class="req">*</span></div>' +
        '<div class="pay-row">' +
          '<button type="button" class="pay-btn" id="' + id + '_paid_yes" onclick="window.selectPay(\'' + id + '\',\'paid\')">✅ Já pago</button>' +
          '<button type="button" class="pay-btn" id="' + id + '_paid_no"  onclick="window.selectPay(\'' + id + '\',\'due\')">💰 A receber</button>' +
        '</div>' +
        '<div class="value-group" id="' + id + '_value_wrap">' +
          '<div class="field-label" style="margin-top:10px">Valor a receber (R$)</div>' +
          '<input class="field-input" id="' + id + '_value" type="text" inputmode="decimal" placeholder="0,00" oninput="window.maskMoney(this)" />' +
        '</div>' +
      '</div>' +
      '<div class="field-group" style="margin-bottom:0">' +
        '<div class="field-label">Observações</div>' +
        '<input class="field-input" id="' + id + '_notes" placeholder="Ligar antes, cuidado com cachorro..." />' +
      '</div>' +
    '</div>';

  document.getElementById('stopsWrap').appendChild(div);
  renumber();
};

window.removeStop = function(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
  renumber();
};

// Atualizar bairros quando cidade muda
window.updateBairros = function(stopId) {
  var citySelect = document.getElementById(stopId + '_city');
  var bairroSelect = document.getElementById(stopId + '_bairro');
  var cityValue = citySelect.value;
  
  if (!cityValue || !CIDADE_BAIRROS[cityValue]) {
    bairroSelect.innerHTML = '<option value="">— Selecione a cidade —</option>';
    return;
  }
  
  var bairros = CIDADE_BAIRROS[cityValue].bairros;
  var html = '<option value="">— Selecione o bairro —</option>';
  bairros.forEach(function(b) {
    html += '<option value="' + b + '">' + b + '</option>';
  });
  bairroSelect.innerHTML = html;
};

function renumber() {
  var cards = document.querySelectorAll('.stop-card');
  cards.forEach(function(el, i) {
    var title = el.querySelector('.stop-card-title');
    var btn   = el.querySelector('.btn-rm');
    if (title) title.innerHTML = '<div class="stop-num">' + (i+1) + '</div> ENTREGA ' + (i+1);
    if (i === 0 && btn) btn.remove();
  });
}

window.selectPay = function(id, type) {
  var yesBtn = document.getElementById(id + '_paid_yes');
  var noBtn  = document.getElementById(id + '_paid_no');
  var wrap   = document.getElementById(id + '_value_wrap');
  if (!yesBtn || !noBtn) return;
  yesBtn.className = 'pay-btn' + (type === 'paid' ? ' paid' : '');
  noBtn.className  = 'pay-btn' + (type === 'due'  ? ' due'  : '');
  if (wrap) wrap.className = 'value-group' + (type === 'due' ? ' show' : '');
};

// ═══════════════════════════════════════════════════
//  ENVIAR
// ═══════════════════════════════════════════════════
window.submitPedido = function() {
  var cards    = document.querySelectorAll('.stop-card');
  var newStops = [];
  var hasErr   = false;

  cards.forEach(function(card) {
    var id = card.id;
    
    // Elementos
    var nameEl      = document.getElementById(id + '_name');
    var cityEl      = document.getElementById(id + '_city');
    var bairroEl    = document.getElementById(id + '_bairro');
    var ruaEl       = document.getElementById(id + '_rua');
    var numeroEl    = document.getElementById(id + '_numero');
    var compEl      = document.getElementById(id + '_complement');
    var phoneEl     = document.getElementById(id + '_phone');
    var yesBtn      = document.getElementById(id + '_paid_yes');
    var dateEl      = document.getElementById(id + '_date');
    var typeEl      = document.getElementById(id + '_type');
    var timeFromEl  = document.getElementById(id + '_timeFrom');
    var timeToEl    = document.getElementById(id + '_timeTo');
    var valEl       = document.getElementById(id + '_value');
    var notesEl     = document.getElementById(id + '_notes');
    
    // Valores
    var name    = nameEl  ? nameEl.value.trim()      : '';
    var city    = cityEl  ? cityEl.value             : '';
    var bairro  = bairroEl ? bairroEl.value          : '';
    var rua     = ruaEl   ? ruaEl.value.trim()       : '';
    var numero  = numeroEl ? numeroEl.value.trim()   : '';
    var comp    = compEl  ? compEl.value.trim()      : '';
    var phone   = phoneEl ? phoneEl.value.replace(/\D/g,'') : '';

    // VALIDAÇÕES OBRIGATÓRIAS
    var errors = [];
    
    if (!name)                  { errors.push(nameEl);    }
    if (!city)                  { errors.push(cityEl);    }
    if (!bairro)                { errors.push(bairroEl);  }
    if (!rua)                   { errors.push(ruaEl);     }
    if (!numero)                { errors.push(numeroEl);  }
    if (!comp)                  { errors.push(compEl);    showToast('⚠️ Complemento é obrigatório (apto, bloco, referência...)', 'error'); }
    if (!phone || phone.length < 10) { errors.push(phoneEl); showToast('⚠️ Telefone inválido ou não preenchido', 'error'); }
    
    if (errors.length > 0) {
      errors.forEach(function(el) { if (el) el.classList.add('error'); });
      if (!hasErr) card.scrollIntoView({behavior:'smooth',block:'center'});
      hasErr = true;
      return;
    }
    
    // Remover marcação de erro se passou
    [nameEl, cityEl, bairroEl, ruaEl, numeroEl, compEl, phoneEl].forEach(function(el) {
      if (el) el.classList.remove('error');
    });

    // Montar endereço completo
    var address = rua + ', ' + numero + ', ' + bairro + ' - ' + CIDADE_BAIRROS[city].nome;

    // Verificar pagamento
    var isPaid  = yesBtn && yesBtn.classList.contains('paid');
    var isNoBtn = document.getElementById(id + '_paid_no');
    var hasPay  = (yesBtn && (yesBtn.classList.contains('paid') || (isNoBtn && isNoBtn.classList.contains('due'))));
    var productVal = valEl ? parseMoney(valEl.value) : 0;

    // Data
    var delivDate = '';
    if (dateEl && dateEl.value) {
      var dp = dateEl.value.split('-');
      delivDate = dp[2] + '/' + dp[1] + '/' + dp[0];
    }

    newStops.push({
      name:         name,
      address:      address,
      complement:   comp,
      phone:        phone,
      timeFrom:     timeFromEl? timeFromEl.value : '',
      timeTo:       timeToEl  ? timeToEl.value   : '',
      deliveryDate: delivDate,
      serviceType:  typeEl    ? typeEl.value     : 'entrega',
      city:         CIDADE_BAIRROS[city].nome,
      neighborhood: bairro,
      street:       rua,
      number:       numero,
      productValue: productVal,
      productPaid:  isPaid,
      value:        0,
      paid:         false,
      notes:        notesEl   ? notesEl.value.trim() : '',
      store:        STORE_NAME || 'Loja',
      done:         false,
      status:       'pending',
      submittedAt:  new Date().toISOString(),
      arrivedAt:    new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
    });
  });

  if (hasErr) { return; }
  if (!newStops.length){ showToast('Adicione pelo menos uma entrega', 'error'); return; }
  if (!db)            { showToast('Sem conexão com o sistema. Recarregue a página.', 'error'); return; }

  document.getElementById('loading').classList.add('show');
  document.getElementById('btnSubmit').disabled = true;

  var pendingRef = db.ref('rooms/' + ROOM + '/pending');
  var promises   = newStops.map(function(s) {
    return pendingRef.push(JSON.stringify(s));
  });

  Promise.all(promises)
    .then(function() {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('mainWrap').style.display = 'none';

      // Resumo
      var html = newStops.map(function(s, i) {
        var valStr  = s.productValue > 0
          ? ' · R$ ' + s.productValue.toFixed(2).replace('.',',') + ' (' + (s.productPaid ? '✅ pago' : '💰 a cobrar') + ')'
          : '';
        var timeStr = (s.timeFrom || s.timeTo)
          ? ' · ⏰ ' + (s.timeFrom||'?') + '–' + (s.timeTo||'?')
          : '';
        var typeIcon = s.serviceType === 'retirada' ? '📦 Retirada' : s.serviceType === 'troca' ? '🔄 Troca' : '🛵 Entrega';
        var dateStr  = s.deliveryDate ? ' · 📅 ' + s.deliveryDate : '';
        return '<div class="success-item">' +
          '<strong>' + typeIcon + ' ' + (i+1) + '. ' + s.name + '</strong>' + dateStr + '<br>' +
          '<span style="font-size:11px;color:var(--muted)">' + s.address + timeStr + valStr + '</span></div>';
      }).join('');

      document.getElementById('successList').innerHTML =
        '<div style="font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:10px">' +
        newStops.length + ' entrega(s) enviada(s)</div>' + html;
      addToClientHistory(newStops);
      document.getElementById('successWrap').classList.add('show');
    })
    .catch(function(e) {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('btnSubmit').disabled = false;
      showToast('Erro ao enviar: ' + e.message, 'error');
      console.error(e);
    });
};

window.resetForm = function() {
  document.getElementById('successWrap').classList.remove('show');
  document.getElementById('stopsWrap').innerHTML = '';
  document.getElementById('mainWrap').style.display = 'block';
  document.getElementById('btnSubmit').disabled = false;
  stopCount = 0;
  window.addStop();
  window.scrollTo(0,0);
};

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
window.maskPhone = function(el) {
  var v = el.value.replace(/\D/g,'');
  if(v.length>11) v=v.substring(0,11);
  if(v.length>7)  v='('+v.substring(0,2)+') '+v.substring(2,7)+'-'+v.substring(7);
  else if(v.length>2) v='('+v.substring(0,2)+') '+v.substring(2);
  el.value=v;
};

window.maskMoney = function(el) {
  var v=el.value.replace(/[^0-9,]/g,'');
  var p=v.split(',');
  if(p.length>2) v=p[0]+','+p.slice(1).join('');
  if(p[1]&&p[1].length>2) v=p[0]+','+p[1].substring(0,2);
  el.value=v;
};

function parseMoney(s) {
  return parseFloat(String(s||'').replace(',','.')) || 0;
}

var _toastTimer;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ t.className='toast'; }, 3500);
}

// ═══════════════════════════════════════════════════
//  TEMA CLARO / ESCURO
// ═══════════════════════════════════════════════════
window.toggleTheme = function() {
  var isLight = document.body.classList.toggle('light');
  var btn = document.getElementById('themeBtn');
  btn.textContent = isLight ? '🌙 Escuro' : '☀️ Claro';
  localStorage.setItem('sb_pedido_theme', isLight ? 'light' : 'dark');
};

// ═══════════════════════════════════════════════════
//  HISTÓRICO DO CLIENTE (localStorage por loja)
// ═══════════════════════════════════════════════════
function getClientHistory() {
  var key = 'sb_client_hist_' + (STORE_NAME||'default');
  try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch(e) { return []; }
}
function saveClientHistory(list) {
  var key = 'sb_client_hist_' + (STORE_NAME||'default');
  localStorage.setItem(key, JSON.stringify(list.slice(0,30))); // keeps last 30
}
function addToClientHistory(stops) {
  var hist = getClientHistory();
  var entry = {
    date: new Date().toLocaleDateString('pt-BR'),
    time: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    stops: stops.map(function(s){ return {name:s.name, address:s.address, serviceType:s.serviceType, city:s.city, deliveryDate:s.deliveryDate}; })
  };
  hist.unshift(entry);
  saveClientHistory(hist);
}
window.toggleHistory = function() {
  var panel = document.getElementById('histPanel');
  var arrow = document.getElementById('histArrow');
  var isOpen = panel.classList.toggle('open');
  if (arrow) arrow.textContent = isOpen ? '▲' : '▼';
  if (isOpen) renderClientHistory();
};
function renderClientHistory() {
  var hist = getClientHistory();
  var count = document.getElementById('histCount');
  if (count) count.textContent = hist.length ? '(' + hist.length + ')' : '';
  var list = document.getElementById('histList');
  if (!hist.length) { list.innerHTML = '<div class="hist-empty">Nenhum pedido ainda.</div>'; return; }
  list.innerHTML = hist.map(function(entry) {
    var stops = entry.stops.map(function(s,i) {
      var type = s.serviceType==='retirada'?'📦':s.serviceType==='troca'?'🔄':'🛵';
      return '<div style="margin-top:4px">' + type + ' ' + (i+1) + '. <strong>' + s.name + '</strong> — ' + (s.city||'') + (s.deliveryDate?' · 📅 '+s.deliveryDate:'') + '</div>';
    }).join('');
    return '<div class="hist-item"><div class="hist-item-name">📅 ' + entry.date + ' às ' + entry.time + '</div><div class="hist-item-info">' + stops + '</div></div>';
  }).join('');
}
function initClientHistory() {
  var hist = getClientHistory();
  var count = document.getElementById('histCount');
  if (count && hist.length) count.textContent = '(' + hist.length + ')';
}

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
window.addEventListener('load', init);
</script>
