<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEEDBOY - Painel Motoboy</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--card:#181818;--card2:#1f1f1f;--border:#2a2a2a;
  --accent:#f5c518;--accent2:#ff6b00;--green:#00e676;--red:#ff3d3d;--blue:#3b82f6;
  --text:#f0f0f0;--muted:#aaa;--radius:14px;
}
body.light{
  --bg:#ffffff;--card:#f5f5f5;--card2:#efefef;--border:#ddd;
  --accent:#c9920a;--accent2:#e05500;--green:#1a7a3f;--red:#cc2233;--blue:#1a65d6;
  --text:#000;--muted:#333;
}
body.night-mode{
  --bg:#000;--card:#0d0d0d;--card2:#1a1a1a;--border:#333;
  --accent:#ffff00;--accent2:#ff8800;--green:#00ff00;--red:#ff0000;--blue:#00ccff;
  --text:#ffffff;--muted:#cccccc;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overscroll-behavior:none;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh;}

/* HEADER */
.header{background:var(--bg);padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;letter-spacing:-1px;color:var(--accent);}
.logo span{color:var(--text);}
.header-right{display:flex;align-items:center;gap:8px;}
.badge-count{background:var(--accent);color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;padding:3px 9px;border-radius:20px;}
.badge-count.full{background:var(--red);color:#fff;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s;}
.sync-dot.synced{background:var(--green);}
.sync-dot.syncing{background:var(--accent);animation:pulse .8s infinite;}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#syncRow{display:none;align-items:center;gap:5px;}
#syncRow.visible{display:flex;}
.sync-label{font-size:10px;font-weight:600;color:var(--muted);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;padding:14px 8px 12px;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:.3px;transition:color .15s;min-height:60px;}
.nav-btn.active{color:var(--accent);}
.nav-btn .icon{font-size:20px;line-height:1;}

/* SCREENS */
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;padding-bottom:70px;}
.screen.active{display:flex;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
.home-top{display:flex;gap:10px;padding:14px 14px 6px;}
.btn-add{flex:1;background:var(--accent);color:#000;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;padding:13px 16px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .1s;}
.btn-add:active{transform:scale(.97);}
.btn-cfg-icon{background:var(--card);border:none;color:var(--text);padding:13px 14px;border-radius:var(--radius);cursor:pointer;font-size:18px;}

/* STOPS LIST */
.stops-list{flex:1;padding:6px 14px 140px;}
.stop-card{background:var(--card);border-radius:var(--radius);margin-bottom:8px;border:1px solid var(--border);overflow:hidden;transition:border-color .2s;}
.stop-card.done{opacity:.45;}
.stop-card.expanded{border-color:var(--accent);}
.stop-header{display:flex;align-items:center;gap:10px;padding:14px 14px 12px;cursor:pointer;}
.stop-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--accent);min-width:24px;}
.stop-info{flex:1;min-width:0;}
.stop-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stop-addr{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.stop-detail{display:none;padding:12px;font-size:13px;color:var(--text);line-height:1.8;background:var(--card2);border-radius:0 0 var(--radius) var(--radius);}
.stop-card.expanded .stop-detail{display:block;}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:1000;display:none;}

</style>
</head>
<body>

<div class="header">
  <div class="logo">SPEED<span>BOY</span></div>
  <div class="header-right">
    <div id="syncRow"><div id="syncDot" class="sync-dot"></div><span id="syncLabel" class="sync-label">offline</span></div>
    <div id="stopCount" class="badge-count">0</div>
  </div>
</div>

<div id="homeScreen" class="screen active">
  <div class="home-top">
    <button class="btn-add" onclick="addNewStop()">+ Nova Parada</button>
    <button class="btn-cfg-icon" onclick="goNav('configScreen', 'nav-cfg')">⚙️</button>
  </div>
  <div id="stopsList" class="stops-list">
    <!-- Paradas serão renderizadas aqui -->
  </div>
</div>

<div id="configScreen" class="screen">
  <div style="padding:20px;">
    <h2 style="margin-bottom:15px;">Configurações</h2>
    <label style="display:block; font-size:12px; color:var(--muted); margin-bottom:5px;">CÓDIGO DA SALA (FIREBASE)</label>
    <input type="text" id="cfgRoom" style="width:100%; padding:12px; background:var(--card2); border:1px solid var(--border); color:#fff; border-radius:8px; margin-bottom:20px;">
    <button onclick="saveConfig()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:8px; font-weight:800; cursor:pointer;">SALVAR E CONECTAR</button>
  </div>
</div>

<div class="bottom-nav">
  <button id="nav-home" class="nav-btn active" onclick="goNav('homeScreen', 'nav-home')"><span class="icon">🏠</span>Início</button>
  <button id="nav-cfg" class="nav-btn" onclick="goNav('configScreen', 'nav-cfg')"><span class="icon">⚙️</span>Config</button>
</div>

<div id="toast" class="toast"></div>

<script>
let stops = JSON.parse(localStorage.getItem('sb_stops') || '[]');

function saveStops() {
  localStorage.setItem('sb_stops', JSON.stringify(stops));
  renderHome();
}

function renderHome() {
  const list = document.getElementById('stopsList');
  document.getElementById('stopCount').textContent = stops.length;
  
  if (stops.length === 0) {
    list.innerHTML = '<div style="text-align:center; padding:40px; color:var(--muted);">Nenhuma parada pendente.</div>';
    return;
  }

  list.innerHTML = stops.map((s, i) => `
    <div class="stop-card ${s.done ? 'done' : ''}" id="stop-${i}">
      <div class="stop-header" onclick="toggleExpand(${i})">
        <div class="stop-num">${i + 1}</div>
        <div class="stop-info">
          <div class="stop-name">${s.name}</div>
          <div class="stop-addr">${s.address}</div>
        </div>
      </div>
      <div class="stop-detail" id="detail-${i}">
        <p><strong>Obs:</strong> ${s.notes || 'Sem observações'}</p>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button onclick="markDone(${i})" style="flex:1; padding:10px; background:var(--green); border:none; border-radius:8px; font-weight:700;">Concluir</button>
          <button onclick="removeStop(${i})" style="flex:1; padding:10px; background:var(--red); border:none; border-radius:8px; font-weight:700;">Remover</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleExpand(i) {
  const card = document.getElementById(`stop-${i}`);
  card.classList.toggle('expanded');
}

function markDone(i) {
  stops[i].done = !stops[i].done;
  saveStops();
}

function removeStop(i) {
  if(confirm('Remover esta parada?')) {
    stops.splice(i, 1);
    saveStops();
  }
}

function addNewStop() {
  const name = prompt('Nome do Cliente:');
  const addr = prompt('Endereço:');
  if(name && addr) {
    stops.push({ name, address: addr, done: false, notes: '' });
    saveStops();
  }
}

function goNav(screenId, btnId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  document.getElementById(btnId).classList.add('active');
}

function saveConfig() {
  const room = document.getElementById('cfgRoom').value.trim();
  if(room) {
    localStorage.setItem('sb_room_code', room);
    showToast('Configurações salvas!');
    goNav('homeScreen', 'nav-home');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// Inicialização
renderHome();
const savedRoom = localStorage.getItem('sb_room_code');
if(savedRoom) document.getElementById('cfgRoom').value = savedRoom;

</script>
</body>
</html>
