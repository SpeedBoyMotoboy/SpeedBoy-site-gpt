<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPEEDBOY - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0a;--card:#181818;--card2:#1f1f1f;--border:#2a2a2a;
  --accent:#f5c518;--accent2:#ff6b00;--green:#00e676;--red:#ff3d3d;--blue:#3b82f6;
  --text:#f0f0f0;--muted:#aaa;--radius:14px;
}
body.light{
  --bg:#ffffff;--card:#f5f5f5;--card2:#efefef;--border:#ddd;
  --accent:#c9920a;--accent2:#e05500;--green:#1a7a3f;--red:#cc2233;--blue:#1a65d6;
  --text:#000;--muted:#333;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overscroll-behavior:none;}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh;}

.header{background:var(--bg);padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;letter-spacing:-1px;color:var(--accent);}
.logo span{color:var(--text);}
.btn-logout{background:var(--red);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;}

.screen{display:none;flex:1;flex-direction:column;overflow-y:auto;padding:14px;padding-bottom:80px;}
.screen.active{display:flex;}

.admin-section{margin-bottom:20px;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:var(--accent);margin-bottom:12px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.card-title{font-weight:600;font-size:14px;margin-bottom:8px;}
.card-text{font-size:12px;color:var(--muted);margin-bottom:4px;}

.btn{background:var(--accent);color:#000;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;margin-top:8px;width:100%;}
.btn-danger{background:var(--red);color:#fff;}
.btn-success{background:var(--green);color:#000;}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;}
.stat-value{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;color:var(--accent);}
.stat-label{font-size:10px;color:var(--muted);margin-top:4px;}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;}
.modal.active{display:flex;}
.modal-content{background:var(--card);border-radius:var(--radius);padding:20px;max-width:90%;max-height:80vh;overflow-y:auto;}
.modal-close{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;float:right;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;padding:12px 8px;background:none;border:none;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:700;}
.nav-btn.active{color:var(--accent);}

.login-screen{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:20px;padding:40px 20px;}
.login-form{width:100%;display:flex;flex-direction:column;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-weight:600;font-size:14px;}
.form-group input, .form-group select{padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--card);color:var(--text);}
.form-group input:focus, .form-group select:focus{outline:none;border-color:var(--accent);}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <div style="font-size:48px;font-weight:900;color:var(--accent);font-family:'Barlow Condensed',sans-serif;">🚀 SPEEDBOY</div>
  <h2 style="text-align:center;">Painel Administrativo</h2>
  
  <div class="login-form">
    <div class="form-group">
      <label>Seu Nome</label>
      <input type="text" id="loginName" placeholder="Ex: Seu Nome">
    </div>
    <div class="form-group">
      <label>Seu Email</label>
      <input type="email" id="loginEmail" placeholder="Ex: admin@email.com">
    </div>
    <button class="btn" onclick="handleLogin()">Entrar como Admin</button>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="adminScreen" class="screen">
  <div class="header">
    <div class="logo">SPEED<span>BOY</span></div>
    <button class="btn-logout" onclick="handleLogout()">Sair</button>
  </div>

  <div class="admin-section">
    <div class="section-title">📊 Estatísticas</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="motoboyCount">0</div>
        <div class="stat-label">Motoboys</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="paymentCount">0</div>
        <div class="stat-label">Pagamentos Pendentes</div>
      </div>
    </div>
  </div>

  <div class="admin-section">
    <div class="section-title">👤 Motoboys Cadastrados</div>
    <div id="motoboysList"></div>
  </div>

  <div class="admin-section">
    <div class="section-title">💰 Pagamentos Pendentes</div>
    <div id="paymentsList"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showScreen('admin')">
    <span style="font-size:18px;">📊</span>
    <span>Admin</span>
  </button>
  <button class="nav-btn" onclick="showScreen('motoboy')">
    <span style="font-size:18px;">🏍️</span>
    <span>Motoboy</span>
  </button>
  <button class="nav-btn" onclick="showScreen('store')">
    <span style="font-size:18px;">🏪</span>
    <span>Loja</span>
  </button>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDL8c28T9Q-IAK9JihzEXtT-OPiYOx24Jg",
  authDomain: "speedboy-3c1c6.firebaseapp.com",
  projectId: "speedboy-3c1c6",
  storageBucket: "speedboy-3c1c6.firebasestorage.app",
  messagingSenderId: "702743802978",
  appId: "1:702743802978:web:7b99217bebcc89f9bc8d3b",
  databaseURL: "https://speedboy-3c1c6-default-rtdb.firebaseio.com"
};

let db = null;
let currentUser = null;

// Inicializar Firebase
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
} catch (e) {
  console.error("Firebase init error:", e);
}

// Carregar usuário do localStorage
function loadUser() {
  const saved = localStorage.getItem('speedboy_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    if (currentUser.role === 'admin') {
      showAdminScreen();
    }
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
  }
}

function handleLogin() {
  const name = document.getElementById('loginName').value.trim();
  const email = document.getElementById('loginEmail').value.trim();

  if (!name || !email) {
    alert('Preencha todos os campos');
    return;
  }

  currentUser = {
    id: Date.now(),
    name,
    email,
    role: 'admin',
    createdAt: new Date().toISOString(),
    accessExpiresAt: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString()
  };

  localStorage.setItem('speedboy_user', JSON.stringify(currentUser));
  document.getElementById('loginScreen').style.display = 'none';
  showAdminScreen();
}

function handleLogout() {
  if (confirm('Deseja sair?')) {
    currentUser = null;
    localStorage.removeItem('speedboy_user');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').style.display = 'none';
  }
}

function showAdminScreen() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'flex';
  loadAdminData();
}

function showScreen(screen) {
  if (screen === 'admin') {
    document.getElementById('adminScreen').style.display = 'flex';
  }
}

function loadAdminData() {
  // Carregar motoboys do Firebase
  if (db) {
    db.ref('motoboys').on('value', (snap) => {
      const motoboys = snap.val() || {};
      const count = Object.keys(motoboys).length;
      document.getElementById('motoboyCount').textContent = count;
      renderMotoboys(motoboys);
    });

    db.ref('payments').on('value', (snap) => {
      const payments = snap.val() || {};
      const pending = Object.values(payments).filter(p => !p.confirmed).length;
      document.getElementById('paymentCount').textContent = pending;
      renderPayments(payments);
    });
  }
}

function renderMotoboys(motoboys) {
  const list = document.getElementById('motoboysList');
  if (Object.keys(motoboys).length === 0) {
    list.innerHTML = '<div class="card">Nenhum motoboy cadastrado</div>';
    return;
  }

  list.innerHTML = Object.entries(motoboys).map(([id, m]) => `
    <div class="card">
      <div class="card-title">${m.name || 'Motoboy'}</div>
      <div class="card-text">📧 ${m.email || 'N/A'}</div>
      <div class="card-text">✅ Acesso: ${m.isPaid ? 'Ativo' : 'Inativo'}</div>
      <div class="card-text">📅 Até: ${new Date(m.accessExpiresAt).toLocaleDateString('pt-BR')}</div>
      <button class="btn btn-success" onclick="confirmPayment('${id}')">✅ Confirmar Pagamento</button>
      <button class="btn btn-accent" onclick="extendAccess('${id}')">⏱️ Estender 7 dias</button>
    </div>
  `).join('');
}

function renderPayments(payments) {
  const list = document.getElementById('paymentsList');
  const pending = Object.entries(payments).filter(([_, p]) => !p.confirmed);
  
  if (pending.length === 0) {
    list.innerHTML = '<div class="card">Nenhum pagamento pendente</div>';
    return;
  }

  list.innerHTML = pending.map(([id, p]) => `
    <div class="card">
      <div class="card-title">${p.motoboyName || 'Motoboy'}</div>
      <div class="card-text">💰 R$ ${p.amount || 20}.00</div>
      <div class="card-text">📅 ${new Date(p.createdAt).toLocaleDateString('pt-BR')}</div>
      <button class="btn btn-success" onclick="confirmPayment('${p.motoboyId}')">✅ Confirmar</button>
    </div>
  `).join('');
}

function confirmPayment(motoboyId) {
  if (db) {
    db.ref(`motoboys/${motoboyId}`).update({
      isPaid: true,
      accessExpiresAt: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
    });
    alert('✅ Pagamento confirmado! Acesso renovado por 7 dias.');
  }
}

function extendAccess(motoboyId) {
  if (db) {
    db.ref(`motoboys/${motoboyId}`).update({
      accessExpiresAt: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
    });
    alert('⏱️ Acesso estendido por 7 dias!');
  }
}

// Inicializar ao carregar
window.addEventListener('load', loadUser);
</script>

</body>
</html>
