<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEEDBOY — Entregas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#070709;--card:#13131a;--card2:#1a1a24;--border:#252535;--accent:#f5c518;--accent2:#ff6b00;--green:#00a854;--red:#ff4560;--blue:#3b82f6;--text:#f0f0f0;--muted:#666;--radius:16px;}
body.light{--bg:#f5f5f0;--card:#ffffff;--card2:#f0f0eb;--border:#ddddd5;--accent:#c9920a;--accent2:#e05500;--green:#1a7a3f;--red:#cc2233;--text:#1a1a1a;--muted:#888;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
body{max-width:480px;margin:0 auto;padding-bottom:30px;}
.hero{position:relative;overflow:hidden;padding:28px 20px 22px;background:linear-gradient(160deg,#0d0d14 0%,#1a1220 60%,#0d0d14 100%);border-bottom:1px solid var(--border);text-align:center;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,197,24,.12) 0%,transparent 65%);pointer-events:none;}
.hero-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;letter-spacing:-2px;color:var(--accent);position:relative;}
.hero-logo span{color:var(--text);}
.hero-tag{font-size:13px;color:var(--muted);margin-top:4px;}
.hero-motoboy{display:inline-flex;align-items:center;gap:6px;background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.3);border-radius:20px;padding:6px 14px;margin-top:10px;font-size:13px;font-weight:600;color:var(--accent);}
.theme-toggle{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;}
.summary{display:flex;gap:10px;padding:16px;margin:16px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);}
.summary-item{flex:1;text-align:center;}
.summary-lbl{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.summary-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;}
.summary-val.ac{color:var(--accent);}
.summary-val.gr{color:var(--green);}
.stops-wrap{padding:0 16px;}
.stop-card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);margin-bottom:10px;overflow:hidden;transition:border-color .2s,opacity .2s;}
.stop-card.done{opacity:.5;border-color:var(--green);}
.stop-hdr{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;}
.stop-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stop-info{flex:1;min-width:0;}
.stop-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stop-addr{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stop-tags{font-size:10px;color:var(--accent);margin-top:3px;}
.stop-taxa{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:var(--green);flex-shrink:0;}
.stop-detail{display:none;padding:0 14px 14px;font-size:13px;line-height:1.8;background:var(--card2);border-top:1px solid var(--border);}
.stop-card.expanded .stop-detail{display:block;}
.stop-detail strong{color:var(--muted);font-size:10px;letter-spacing:.5px;}
.stop-actions{display:none;padding:0 14px 14px;gap:8px;}
.stop-card.expanded .stop-actions{display:flex;}
.btn-act{flex:1;padding:14px;border-radius:10px;border:none;font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-act:active{transform:scale(.95);}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-wrap{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:40px 24px;text-align:center;}
.error-wrap.show{display:flex;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--green);color:var(--green);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="hero">
  <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️ Claro</button>
  <div class="hero-logo">SPEED<span>BOY</span></div>
  <div class="hero-tag">Entregas para você</div>
  <div class="hero-motoboy">🏍️ <span id="motoName">Motoboy</span></div>
</div>
<div id="loadingWrap" class="loading-wrap">
  <div class="spinner"></div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--accent);">Carregando entregas...</div>
</div>
<div id="mainWrap" style="display:none;">
  <div class="summary" id="summaryBar"></div>
  <div class="stops-wrap" id="stopsWrap"></div>
</div>
<div id="errorWrap" class="error-wrap">
  <div style="font-size:64px;margin-bottom:16px">⚠️</div>
  <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:var(--red);margin-bottom:10px;">Link inválido</div>
  <div style="font-size:13px;color:var(--muted);line-height:1.6;max-width:260px;">Peça um novo link para o Luan.</div>
</div>
<script>
'use strict';
var FIREBASE_CONFIG = {
  apiKey:"AIzaSyDL8c28T9Q-IAK9JihzEXtT-OPiYOx24Jg",
  authDomain:"speedboy-3c1c6.firebaseapp.com",
  projectId:"speedboy-3c1c6",
  storageBucket:"speedboy-3c1c6.firebasestorage.app",
  messagingSenderId:"702743802978",
  appId:"1:702743802978:web:7b99217bebcc89f9bc8d3b",
  databaseURL:"https://speedboy-3c1c6-default-rtdb.firebaseio.com"
};
var params=new URLSearchParams(window.location.search);
var ROOM=(params.get('room')||'').toUpperCase();
var REPASS_ID=params.get('id')||'';
var db=null;
var repassData=null;

function init(){
  if(!ROOM||!REPASS_ID){showError();return;}
  try{firebase.initializeApp(FIREBASE_CONFIG);db=firebase.database();}catch(e){showError();return;}
  if(localStorage.getItem('sb_moto_theme')==='light'){document.body.classList.add('light');document.getElementById('themeBtn').textContent='🌙 Escuro';}
  var ref=db.ref('rooms/'+ROOM+'/repass/'+REPASS_ID);
  ref.on('value',function(snap){
    var raw=snap.val();
    if(!raw){showError();return;}
    try{
      repassData=typeof raw==='string'?JSON.parse(raw):raw;
      document.getElementById('loadingWrap').style.display='none';
      document.getElementById('mainWrap').style.display='block';
      document.getElementById('motoName').textContent=repassData.motoboy||'Motoboy';
      document.title='SPEEDBOY — '+(repassData.motoboy||'Entregas');
      renderStops();
    }catch(e){console.error(e);showError();}
  });
}

function renderStops(){
  if(!repassData||!repassData.deliveries)return;
  var items=repassData.deliveries;
  var total=0,doneCount=0;
  items.forEach(function(s){total+=(s.taxa||0);if(s.done)doneCount++;});
  document.getElementById('summaryBar').innerHTML=
    '<div class="summary-item"><div class="summary-lbl">Entregas</div><div class="summary-val ac">'+items.length+'</div></div>'+
    '<div class="summary-item"><div class="summary-lbl">Feitas</div><div class="summary-val gr">'+doneCount+'/'+items.length+'</div></div>'+
    '<div class="summary-item"><div class="summary-lbl">Ganho</div><div class="summary-val gr">R$ '+total.toFixed(2).replace('.',',')+'</div></div>';
  var wrap=document.getElementById('stopsWrap');
  wrap.innerHTML=items.map(function(s,i){
    var taxaStr=s.taxa>0?'R$ '+s.taxa.toFixed(2).replace('.',','):'';
    var tags=[s.serviceType==='retirada'?'📦':s.serviceType==='troca'?'🔄':'🛵',s.city||'',s.deliveryDate||''].filter(Boolean).join(' · ');
    var doneClass=s.done?' done':'';
    return '<div class="stop-card'+doneClass+'" id="mc'+i+'" onclick="toggleMCard('+i+')">'+
      '<div class="stop-hdr">'+
        '<div class="stop-num">'+(i+1)+'</div>'+
        '<div class="stop-info">'+
          '<div class="stop-name">'+(s.name||'Sem nome')+'</div>'+
          '<div class="stop-addr">'+(s.address||'')+'</div>'+
          (tags?'<div class="stop-tags">'+tags+'</div>':'')+
        '</div>'+
        (taxaStr?'<div class="stop-taxa">'+taxaStr+'</div>':'')+
      '</div>'+
      '<div class="stop-detail">'+
        (s.phone?'<div><strong>TEL </strong>'+fmtPhone(s.phone)+'</div>':'')+
        (s.complement?'<div><strong>COMPL </strong>'+s.complement+'</div>':'')+
        (s.reference?'<div><strong>REF </strong>'+s.reference+'</div>':'')+
        ((s.timeFrom||s.timeTo)?'<div><strong>HORÁRIO </strong>⏰ '+(s.timeFrom||'?')+' até '+(s.timeTo||'?')+'</div>':'')+
        (s.store?'<div><strong>LOJA </strong>🏪 '+s.store+'</div>':'')+
        (s.notes?'<div><strong>OBS </strong>'+s.notes+'</div>':'')+
        (s.productValue>0?'<div><strong>COBRAR </strong>R$ '+s.productValue.toFixed(2).replace('.',',')+' '+(s.productPaid?'✅ pago':'💰 a cobrar')+'</div>':'')+
      '</div>'+
      '<div class="stop-actions" onclick="event.stopPropagation()">'+
        '<button class="btn-act" onclick="openMaps('+i+')" style="background:#4285f4;color:#fff;">🗺️ Navegar</button>'+
        (s.phone?'<button class="btn-act" onclick="openWpp('+i+')" style="background:#25d366;color:#fff;">💬 WhatsApp</button>':'')+
        '<button class="btn-act" onclick="toggleDone('+i+')" style="background:'+(s.done?'var(--card2);color:var(--muted);border:1px solid var(--border)':'var(--green);color:#000')+';">'+(s.done?'↩️ Reabrir':'✅ Entregue')+'</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

function toggleMCard(i){
  var c=document.getElementById('mc'+i);
  var was=c.classList.contains('expanded');
  document.querySelectorAll('.stop-card').forEach(function(x){x.classList.remove('expanded');});
  if(!was)c.classList.add('expanded');
}

function toggleDone(i){
  if(!repassData||!repassData.deliveries)return;
  repassData.deliveries[i].done=!repassData.deliveries[i].done;
  saveRepass();
  renderStops();
  showToast(repassData.deliveries[i].done?'✅ Entregue!':'↩️ Reaberta','success');
}

function saveRepass(){
  if(!db||!ROOM||!REPASS_ID||!repassData)return;
  db.ref('rooms/'+ROOM+'/repass/'+REPASS_ID).set(JSON.stringify(repassData));
}

function openMaps(i){
  var s=repassData.deliveries[i];
  var addr=encodeURIComponent(s.address+(s.complement?', '+s.complement:''));
  window.open('https://maps.google.com/?q='+addr,'_blank');
}

function openWpp(i){
  var s=repassData.deliveries[i];
  if(!s.phone)return;
  var msg='Olá '+(s.name||'')+', estou a caminho com sua entrega! 🛵';
  window.open('https://wa.me/55'+s.phone+'?text='+encodeURIComponent(msg),'_blank');
}

function fmtPhone(p){
  var d=p.replace(/\D/g,'');
  return d.length===11?'('+d.slice(0,2)+') '+d.slice(2,7)+'-'+d.slice(7):p;
}

function showError(){
  document.getElementById('loadingWrap').style.display='none';
  document.getElementById('errorWrap').classList.add('show');
}

function toggleTheme(){
  var isLight=document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent=isLight?'🌙 Escuro':'☀️ Claro';
  localStorage.setItem('sb_moto_theme',isLight?'light':'dark');
}

var _toastTimer;
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.className='toast';},3000);
}

window.addEventListener('load',init);
</script>
</body>
</html>
